name: Client CI

on:
  pull_request:
    paths:
      - "catdex-client/**"
      - ".github/workflows/client-ci.yml"
  push:
    branches:
      - main
    paths:
      - "catdex-client/**"
      - ".github/workflows/client-ci.yml"

jobs:
  client:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: catdex-client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: catdex-client/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

