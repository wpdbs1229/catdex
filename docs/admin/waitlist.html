<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>냥도감 관리자 | 출시 알림 신청자</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      :root {
        color-scheme: light;
        --ink: #211916;
        --muted: #75685f;
        --paper: #fff7ea;
        --surface: #ffffff;
        --line: #eadccd;
        --clay: #c86f47;
        --green: #386b58;
        --danger: #9f3a21;
        --shadow: 0 18px 48px rgba(36, 27, 23, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid rgba(234, 220, 205, 0.82);
        padding: 14px clamp(18px, 4vw, 52px);
        background: rgba(255, 247, 234, 0.9);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 950;
      }

      .brand img {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        box-shadow: 0 8px 20px rgba(90, 57, 40, 0.14);
      }

      .topbar-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .page {
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: 48px clamp(18px, 4vw, 52px) 80px;
      }

      .page-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 24px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(34px, 5vw, 58px);
        line-height: 1.06;
        font-weight: 950;
      }

      .subtitle {
        max-width: 720px;
        margin-top: 14px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
        font-weight: 750;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .login-panel {
        width: min(480px, 100%);
        padding: 24px;
      }

      .login-panel h2,
      .table-panel h2 {
        font-size: 22px;
        font-weight: 950;
      }

      .form {
        display: grid;
        gap: 14px;
        margin-top: 18px;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      .label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 900;
      }

      .input,
      .select {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        background: #fff;
        color: var(--ink);
        font-size: 14px;
        font-weight: 800;
      }

      .input:focus,
      .select:focus {
        outline: 3px solid rgba(56, 107, 88, 0.18);
        border-color: rgba(56, 107, 88, 0.48);
      }

      .button {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--ink);
        border-radius: 8px;
        padding: 0 14px;
        background: var(--ink);
        color: #fff;
        font-size: 14px;
        font-weight: 950;
        white-space: nowrap;
      }

      .button.secondary {
        border-color: var(--line);
        background: rgba(255, 255, 255, 0.84);
        color: var(--ink);
      }

      .button.ghost {
        border-color: transparent;
        background: transparent;
        color: var(--muted);
      }

      .status {
        min-height: 22px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 800;
        line-height: 1.55;
      }

      .status[data-state="success"] {
        color: var(--green);
      }

      .status[data-state="error"] {
        color: var(--danger);
      }

      .table-panel {
        overflow: hidden;
      }

      .table-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid var(--line);
        padding: 18px;
      }

      .summary {
        color: var(--muted);
        font-size: 13px;
        font-weight: 900;
      }

      .filters {
        display: grid;
        grid-template-columns: minmax(180px, 1fr) minmax(120px, 160px) minmax(120px, 160px) auto;
        gap: 10px;
        border-bottom: 1px solid var(--line);
        padding: 14px 18px;
        background: rgba(255, 247, 234, 0.56);
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        min-width: 920px;
        border-collapse: collapse;
      }

      th,
      td {
        border-bottom: 1px solid rgba(234, 220, 205, 0.78);
        padding: 12px 14px;
        text-align: left;
        vertical-align: middle;
        font-size: 14px;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        font-weight: 950;
        white-space: nowrap;
      }

      td {
        font-weight: 760;
      }

      .email {
        font-weight: 950;
      }

      .tag {
        display: inline-flex;
        min-height: 26px;
        align-items: center;
        border: 1px solid rgba(234, 220, 205, 0.94);
        border-radius: 999px;
        padding: 0 9px;
        background: rgba(255, 247, 234, 0.78);
        color: var(--muted);
        font-size: 12px;
        font-weight: 950;
      }

      .empty {
        padding: 42px 18px;
        color: var(--muted);
        text-align: center;
        font-weight: 850;
      }

      .pagination {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 18px;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 760px) {
        .topbar,
        .page-head,
        .table-head,
        .pagination {
          align-items: stretch;
          flex-direction: column;
        }

        .filters {
          grid-template-columns: 1fr;
        }

        .topbar-actions {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="../index.html">
        <img src="../assets/catdex-app-icon.png" alt="" />
        <span>냥도감 관리자</span>
      </a>
      <div class="topbar-actions">
        <a class="button secondary" href="../index.html">랜딩 페이지</a>
        <button class="button ghost hidden" type="button" data-logout>로그아웃</button>
      </div>
    </header>

    <main class="page">
      <section class="page-head">
        <div>
          <h1>출시 알림 신청자</h1>
          <p class="subtitle">관리자 이메일과 비밀번호로 로그인한 뒤 권한이 확인된 계정만 이메일 목록을 조회할 수 있습니다.</p>
        </div>
      </section>

      <section class="panel login-panel" data-login-panel>
        <h2>관리자 로그인</h2>
        <form class="form" data-login-form>
          <label class="field">
            <span class="label">이메일</span>
            <input class="input" name="email" type="email" autocomplete="username" required />
          </label>
          <label class="field">
            <span class="label">비밀번호</span>
            <input class="input" name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="button" type="submit">로그인</button>
          <button class="button ghost" type="button" data-reset-password>비밀번호 재설정 메일 받기</button>
          <p class="status" data-login-status role="status" aria-live="polite"></p>
        </form>
      </section>

      <section class="panel login-panel hidden" data-password-panel>
        <h2>새 비밀번호 설정</h2>
        <form class="form" data-password-form>
          <label class="field">
            <span class="label">새 비밀번호</span>
            <input class="input" name="password" type="password" autocomplete="new-password" minlength="12" required />
          </label>
          <button class="button" type="submit">비밀번호 저장</button>
          <p class="status" data-password-status role="status" aria-live="polite"></p>
        </form>
      </section>

      <section class="panel table-panel hidden" data-admin-panel>
        <div class="table-head">
          <div>
            <h2>신청 목록</h2>
            <p class="summary" data-summary>불러오는 중</p>
          </div>
          <div class="topbar-actions">
            <button class="button secondary" type="button" data-download>CSV 다운로드</button>
            <button class="button" type="button" data-refresh>새로고침</button>
          </div>
        </div>

        <form class="filters" data-filter-form>
          <input class="input" name="q" type="search" placeholder="이메일 검색" />
          <select class="select" name="platform" aria-label="플랫폼">
            <option value="all">전체 플랫폼</option>
            <option value="ios">iOS</option>
            <option value="android">Android</option>
            <option value="both">둘 다</option>
            <option value="unknown">미정</option>
          </select>
          <select class="select" name="status" aria-label="상태">
            <option value="subscribed">구독 중</option>
            <option value="all">전체 상태</option>
            <option value="unsubscribed">해지</option>
          </select>
          <button class="button secondary" type="submit">필터 적용</button>
        </form>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>이메일</th>
                <th>플랫폼</th>
                <th>상태</th>
                <th>출시 알림</th>
                <th>업데이트 소식</th>
                <th>등록일</th>
                <th>최근 제출</th>
                <th>출처</th>
              </tr>
            </thead>
            <tbody data-table-body></tbody>
          </table>
          <div class="empty hidden" data-empty>표시할 신청자가 없습니다.</div>
        </div>

        <div class="pagination">
          <p class="summary" data-page-summary>1페이지</p>
          <div class="topbar-actions">
            <button class="button secondary" type="button" data-prev>이전</button>
            <button class="button secondary" type="button" data-next>다음</button>
          </div>
        </div>
      </section>
    </main>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const supabaseUrl = "https://wqiqdybzhbmsvccpklli.supabase.co";
      const supabasePublishableKey = "sb_publishable_MISNyBxkkXHU7zAjSBl2Ow_nQ4yzCyp";
      const adminEndpoint = "https://wqiqdybzhbmsvccpklli.supabase.co/functions/v1/launch-waitlist-admin";
      const pageSize = 50;

      const supabase = createClient(supabaseUrl, supabasePublishableKey, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true,
        },
      });

      const loginPanel = document.querySelector("[data-login-panel]");
      const passwordPanel = document.querySelector("[data-password-panel]");
      const adminPanel = document.querySelector("[data-admin-panel]");
      const loginForm = document.querySelector("[data-login-form]");
      const passwordForm = document.querySelector("[data-password-form]");
      const filterForm = document.querySelector("[data-filter-form]");
      const loginStatus = document.querySelector("[data-login-status]");
      const passwordStatus = document.querySelector("[data-password-status]");
      const resetPasswordButton = document.querySelector("[data-reset-password]");
      const logoutButton = document.querySelector("[data-logout]");
      const refreshButton = document.querySelector("[data-refresh]");
      const downloadButton = document.querySelector("[data-download]");
      const prevButton = document.querySelector("[data-prev]");
      const nextButton = document.querySelector("[data-next]");
      const tableBody = document.querySelector("[data-table-body]");
      const emptyState = document.querySelector("[data-empty]");
      const summary = document.querySelector("[data-summary]");
      const pageSummary = document.querySelector("[data-page-summary]");

      let offset = 0;
      let currentEntries = [];
      let currentTotal = 0;
      let isPasswordRecovery = false;

      function setLoginStatus(message, state = "") {
        loginStatus.textContent = message;
        loginStatus.dataset.state = state;
      }

      function setPasswordStatus(message, state = "") {
        passwordStatus.textContent = message;
        passwordStatus.dataset.state = state;
      }

      function setAuthenticatedView(isAuthenticated) {
        loginPanel.classList.toggle("hidden", isAuthenticated);
        passwordPanel.classList.add("hidden");
        adminPanel.classList.toggle("hidden", !isAuthenticated);
        logoutButton.classList.toggle("hidden", !isAuthenticated);
      }

      function setPasswordRecoveryView() {
        loginPanel.classList.add("hidden");
        passwordPanel.classList.remove("hidden");
        adminPanel.classList.add("hidden");
        logoutButton.classList.add("hidden");
      }

      function formatDate(value) {
        if (!value) {
          return "-";
        }

        return new Intl.DateTimeFormat("ko-KR", {
          dateStyle: "medium",
          timeStyle: "short",
        }).format(new Date(value));
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function yesNo(value) {
        return value ? "동의" : "미동의";
      }

      function renderRows(entries) {
        tableBody.innerHTML = entries.map((entry) => `
          <tr>
            <td class="email">${escapeHtml(entry.email)}</td>
            <td><span class="tag">${escapeHtml(entry.platform)}</span></td>
            <td><span class="tag">${escapeHtml(entry.status)}</span></td>
            <td>${yesNo(entry.launchNoticeConsent)}</td>
            <td>${yesNo(entry.updateNewsConsent)}</td>
            <td>${formatDate(entry.createdAt)}</td>
            <td>${formatDate(entry.lastSubmittedAt)}</td>
            <td>${escapeHtml(entry.source)}</td>
          </tr>
        `).join("");

        emptyState.classList.toggle("hidden", entries.length > 0);
      }

      function getFilters() {
        const formData = new FormData(filterForm);

        return {
          q: String(formData.get("q") ?? "").trim(),
          platform: String(formData.get("platform") ?? "all"),
          status: String(formData.get("status") ?? "subscribed"),
        };
      }

      async function loadEntries() {
        const {
          data: { session },
        } = await supabase.auth.getSession();

        if (!session) {
          setAuthenticatedView(false);
          return;
        }

        refreshButton.disabled = true;
        summary.textContent = "불러오는 중";

        const filters = getFilters();
        const params = new URLSearchParams({
          limit: String(pageSize),
          offset: String(offset),
          status: filters.status,
          platform: filters.platform,
        });

        if (filters.q) {
          params.set("q", filters.q);
        }

        try {
          const response = await fetch(`${adminEndpoint}?${params.toString()}`, {
            headers: {
              authorization: `Bearer ${session.access_token}`,
            },
          });
          const payload = await response.json().catch(() => ({}));

          if (!response.ok) {
            throw new Error(payload.error ?? "목록을 불러오지 못했습니다.");
          }

          currentEntries = payload.entries ?? [];
          currentTotal = payload.total ?? 0;
          renderRows(currentEntries);

          const currentPage = Math.floor(offset / pageSize) + 1;
          const totalPages = Math.max(Math.ceil(currentTotal / pageSize), 1);
          summary.textContent = `총 ${currentTotal.toLocaleString("ko-KR")}명`;
          pageSummary.textContent = `${currentPage} / ${totalPages}페이지`;
          prevButton.disabled = offset === 0;
          nextButton.disabled = offset + pageSize >= currentTotal;
        } catch (error) {
          renderRows([]);
          summary.textContent = error instanceof Error ? error.message : "목록을 불러오지 못했습니다.";
          pageSummary.textContent = "-";
          prevButton.disabled = true;
          nextButton.disabled = true;
        } finally {
          refreshButton.disabled = false;
        }
      }

      function downloadCsv() {
        const header = ["email", "platform", "status", "launch_notice_consent", "update_news_consent", "created_at", "last_submitted_at", "source"];
        const lines = currentEntries.map((entry) => [
          entry.email,
          entry.platform,
          entry.status,
          entry.launchNoticeConsent,
          entry.updateNewsConsent,
          entry.createdAt,
          entry.lastSubmittedAt,
          entry.source,
        ].map((value) => `"${String(value ?? "").replaceAll('"', '""')}"`).join(","));
        const blob = new Blob([[header.join(","), ...lines].join("\n")], { type: "text/csv;charset=utf-8" });
        const link = document.createElement("a");

        link.href = URL.createObjectURL(blob);
        link.download = `catdex-launch-waitlist-${new Date().toISOString().slice(0, 10)}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
      }

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setLoginStatus("로그인 중입니다.");

        const formData = new FormData(loginForm);
        const email = String(formData.get("email") ?? "").trim();
        const password = String(formData.get("password") ?? "");

        try {
          const { error } = await supabase.auth.signInWithPassword({ email, password });

          if (error) {
            throw error;
          }

          setLoginStatus("");
          setAuthenticatedView(true);
          offset = 0;
          await loadEntries();
        } catch (error) {
          setLoginStatus(error instanceof Error ? error.message : "로그인에 실패했습니다.", "error");
        }
      });

      resetPasswordButton.addEventListener("click", async () => {
        const formData = new FormData(loginForm);
        const email = String(formData.get("email") ?? "").trim();

        if (!email) {
          setLoginStatus("비밀번호를 재설정할 이메일을 입력해 주세요.", "error");
          return;
        }

        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.href.split("#")[0],
        });

        if (error) {
          setLoginStatus(error.message, "error");
          return;
        }

        setLoginStatus("비밀번호 재설정 메일을 보냈습니다.", "success");
      });

      passwordForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setPasswordStatus("저장 중입니다.");

        const formData = new FormData(passwordForm);
        const password = String(formData.get("password") ?? "");

        try {
          const { error } = await supabase.auth.updateUser({ password });

          if (error) {
            throw error;
          }

          setPasswordStatus("비밀번호가 저장됐습니다.", "success");
          setAuthenticatedView(true);
          await loadEntries();
        } catch (error) {
          setPasswordStatus(error instanceof Error ? error.message : "비밀번호 저장에 실패했습니다.", "error");
        }
      });

      filterForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        offset = 0;
        await loadEntries();
      });

      logoutButton.addEventListener("click", async () => {
        await supabase.auth.signOut();
        setAuthenticatedView(false);
        setLoginStatus("");
      });

      refreshButton.addEventListener("click", () => {
        void loadEntries();
      });

      downloadButton.addEventListener("click", downloadCsv);

      prevButton.addEventListener("click", () => {
        offset = Math.max(offset - pageSize, 0);
        void loadEntries();
      });

      nextButton.addEventListener("click", () => {
        if (offset + pageSize < currentTotal) {
          offset += pageSize;
          void loadEntries();
        }
      });

      supabase.auth.onAuthStateChange((event) => {
        if (event === "PASSWORD_RECOVERY") {
          isPasswordRecovery = true;
          setPasswordRecoveryView();
        }
      });

      const {
        data: { session },
      } = await supabase.auth.getSession();

      if (!isPasswordRecovery) {
        setAuthenticatedView(Boolean(session));
      }

      if (session && !isPasswordRecovery) {
        await loadEntries();
      }
    </script>
  </body>
</html>
